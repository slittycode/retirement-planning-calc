name: CI

on:
  pull_request:
  push:
    branches-ignore: [main] # pushes to main run the deploy workflow, which also tests

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
